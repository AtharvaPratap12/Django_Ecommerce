{% extends 'base.html' %}
{% block content %}

<!-- Header-->
        <header class="bg-dark py-5">
            <div class="container px-4 px-lg-5 my-5">
                <div class="text-center text-white">
                    <h1 class="display-4 fw-bolder">Categories</h1>
                    <p class="lead fw-normal text-white-50 mb-0">Choose the category from the below in which ur interested</p>
                </div>
            </div>
        </header>
        <div class = "container">
            <div class = "row">
                <center>
                    <div class = "col-8">
                    
                        {% for category in categories %}

                        <li><a class="dropdown-item" href="{% url 'category' category %}"><h3>{{ category }}</h3></a></li>

                        {% endfor %}
                        


<br></br><br></br><br></br><br></br><br></br><br></br>



                    </div>
                </center>
            </div>
        </div>
    
{% endblock %}
