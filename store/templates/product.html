{% extends 'base.html' %}
{% block content %}
<div class = "container">
    <br>


    <div class="card mb-3">
  <div class="row g-0">
    <div class="col-md-4">
      <img src="{{ product.image.url}}" class="img-fluid rounded-start" alt="...">
    </div>
    <div class="col-md-8">
      <div class="card-body">
        <h5 class="card-title">{{ product.name }}</h5>
        <p class="card-text">{{ product.description }}
            <br>
            {% if product.is_sale %}<div class="d-flex justify-content-center small text-warning mb-2">
                                    &nbsp;&nbsp;SALE!!!&nbsp;&nbsp;
                                    <div class="bi-star-fill" ></div>
                                    </div>

                                    <!-- Product price-->
                                    <strike>
                                        ${{ product.price }}
                                    </strike>
                                    &nbsp;
                                    ${{ product.sale_price }}

            {% else %}
            ${{ product.price }}
            {% endif %}
        </p>
        <p class="card-text"><small class="text-body-secondary">Last updated 3 mins ago</small></p>
        <br><br>
<br><br>
<br><br>
<br><br>
        <a href="#" class = "btn btn-secondary">Add to Cart</a>
        <a href="{% url 'home' %}" class="btn btn-primary">Back</a>


      </div>
    </div>
  </div>
</div>
<br><br>
<br><br>
<br><br>
<br><br>

</div>
    
{% endblock %}
